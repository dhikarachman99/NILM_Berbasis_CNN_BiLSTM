name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          NEXT_PUBLIC_ML_SERVICE_URL: ${{ secrets.ML_SERVICE_URL || 'https://dhikarachman-nilm-ml-service.hf.space' }}
          NEXT_PUBLIC_USE_DUMMY_BLYNK: "false"
          NEXT_PUBLIC_REFRESH_INTERVAL: "3000"
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          GITHUB_ACTIONS: "true"
        run: npm run build

      - name: Verify build output
        run: |
          test -f out/index.html || (echo "ERROR: out/index.html tidak ada" && exit 1)
          ls -la out/

      - name: Copy build to docs/ (GitHub Pages folder)
        run: |
          rm -rf docs
          cp -r out docs
          touch docs/.nojekyll

      - name: Commit and push docs/
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "deploy: update GitHub Pages dashboard"
          file_pattern: docs/**
          skip_dirty_check: true
