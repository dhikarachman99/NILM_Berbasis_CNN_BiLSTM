# Deploy ML service (Flask + TensorFlow) on Render.
# Dashboard Next.js deploys separately on Vercel.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: nilm-ml-service
    runtime: python
    rootDir: ml_service
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120 app:app
    healthCheckPath: /health
    envVars:
      - key: NILM_MODEL_DIR
        value: src/nilm_models_v9
      - key: PYTHON_VERSION
        value: "3.11.9"
